name: Feature Request
description: Propose a new feature or improvement for Styre
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? What is missing or frustrating today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: OSS core or commercial Control Plane?
      description: >
        Styre is open-core. The OSS core covers `styre run`, `styre setup`, and `styre migrate` (single-ticket
        execution, local setup, schema migration). The commercial Control Plane adds the daemon, continuous
        ticket pickup, scheduling, inbox management, and the web UI. Selecting the right scope helps triage faster.
      options:
        - OSS core (run / setup / migrate)
        - Commercial Control Plane
        - Not sure / spans both
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you have thought about?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, links, or examples that would help.
    validations:
      required: false
